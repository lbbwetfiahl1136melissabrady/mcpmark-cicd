name: "Pull Request Automation Workflow"

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-quality:
    name: code-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint check
        id: eslint_check
        run: |
          npm run lint

      - name: Run Prettier formatting check
        id: prettier_check
        run: |
          npx prettier --check .

      - name: Post Code Quality Report
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const eslintResult = `${{ steps.eslint_check.outcome }}`;
            const prettierResult = `${{ steps.prettier_check.outcome }}`;
            
            const commentBody = `
            ## Code Quality Report
            ### ESLint Check: ${eslintResult === 'success' ? '✅ Passed' : '❌ Failed'}
            ### Prettier Check: ${prettierResult === 'success' ? '✅ Passed' : '❌ Failed'}
            `;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });

  testing-suite:
    name: testing-suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        id: test_run
        run: |
          npm test -- --coverage

      - name: Post Test Coverage Report
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const coverageSummaryPath = './coverage/coverage-summary.json';
            
            let coverageData = { total: { lines: { pct: 0 }, statements: { pct: 0 }, functions: { pct: 0 }, branches: { pct: 0 } } };
            if (fs.existsSync(coverageSummaryPath)) {
              coverageData = JSON.parse(fs.readFileSync(coverageSummaryPath, 'utf8'));
            }
            
            const commentBody = `
            ## Test Coverage Report
            | Metric | Percentage |
            |--------|------------|
            | Lines | ${coverageData.total.lines.pct}% |
            | Statements | ${coverageData.total.statements.pct}% |
            | Functions | ${coverageData.total.functions.pct}% |
            | Branches | ${coverageData.total.branches.pct}% |
            `;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run dependency vulnerability check (npm audit)
        id: npm_audit
        run: |
          npm audit --json > npm-audit-results.json || true

      - name: Scan for secrets (TruffleHog)
        id: secret_scan
        uses: trufflesecurity/trufflehog@v3
        with:
          path: .
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          output: trufflehog-results.json

      - name: Post Security Scan Report
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const auditPath = './npm-audit-results.json';
            const secretScanPath = './trufflehog-results.json';
            
            let auditData = { metadata: { vulnerabilities: { critical: 0, high: 0, moderate: 0, low: 0 } } };
            if (fs.existsSync(auditPath)) {
              auditData = JSON.parse(fs.readFileSync(auditPath, 'utf8'));
            }
            
            let secretScanResults = [];
            if (fs.existsSync(secretScanPath)) {
              secretScanResults = JSON.parse(fs.readFileSync(secretScanPath, 'utf8'));
            }
            
            const commentBody = `
            ## Security Scan Report
            ### Dependencies Vulnerabilities:
            - Critical: ${auditData.metadata.vulnerabilities.critical || 0}
            - High: ${auditData.metadata.vulnerabilities.high || 0}
            - Moderate: ${auditData.metadata.vulnerabilities.moderate || 0}
            - Low: ${auditData.metadata.vulnerabilities.low || 0}
            
            ### Secrets Scan: ${secretScanResults.length === 0 ? '✅ No secrets detected' : '❌ Potential secrets found'}
            `;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });

  build-validation:
    name: build-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        id: app_build
        run: |
          npm run build

      - name: Validate application endpoints
        id: endpoint_validation
        run: |
          # Start the application
          npm run start &
          APP_PID=$!
          
          # Wait for server to start
          sleep 10
          
          # Check default endpoint (adjust URL as needed for your app)
          curl -f http://localhost:3000 || exit 1
          
          # Clean up
          kill $APP_PID

      - name: Upload build preview artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-preview
          path: dist/ # Adjust path to your project's build output

      - name: Post Build Validation Report
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const buildResult = `${{ steps.app_build.outcome }}`;
            const endpointResult = `${{ steps.endpoint_validation.outcome }}`;
            
            const commentBody = `
            ## Build Validation
            ### Application Build: ${buildResult === 'success' ? '✅ Passed' : '❌ Failed'}
            ### Endpoints Validation: ${endpointResult === 'success' ? '✅ Passed' : '❌ Failed'}
            `;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });